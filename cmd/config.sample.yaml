# agent-sdk-go CLI configuration sample
#
# 1. Copy this file to config.yaml:
#    cp cmd/config.sample.yaml cmd/config.yaml
#
# 2. Edit cmd/config.yaml with your values (API keys, Temporal host, etc.)
# 3. Run: go run ./cmd   or   ./cmd/bin/agentctl -config cmd/config.yaml
#
# Environment variables with AGENT_ prefix override file values.
# Example: AGENT_LLM_APIKEY=sk-xxx AGENT_LLM_PROVIDER=openai go run ./cmd

# Runtime: local (default) or temporal.
# local    — runs entirely in-process; no Temporal server required.
# temporal — durable execution via Temporal; requires a running Temporal server.
# Override per-run: AGENT_RUNTIME=temporal go run ./cmd
runtime: local

# Temporal connection (for durable agent execution)
temporal:
  host: localhost       # Temporal server host; use AGENT_TEMPORAL_HOST to override
  port: 7233            # Temporal gRPC port
  namespace: default     # Temporal namespace
  taskQueue: agent-sdk-go   # Task queue for agent workflows

# LLM provider (OpenAI, Anthropic, Gemini, DeepSeek, or Ollama)
llm:
  provider: openai      # openai | anthropic | gemini | deepseek | ollama
  apiKey: ""            # Set here or via AGENT_LLM_APIKEY (preferred for secrets). Not needed for ollama (local).
  model: gpt-4o         # Model name, e.g. gpt-4o, claude-haiku-4-5, gemini-2.5-flash, deepseek-chat, llama3.2
  baseURL: https://api.openai.com/v1   # Optional; OpenAI-compatible proxies. Leave unset for deepseek (https://api.deepseek.com) or ollama (http://localhost:11434/v1).

# Logger: file by default (JSON + caller). Prompts/responses use fmt in main, not this logger.
logger:
  level: info              # error | warn | info | debug
  output: logs/agent.log   # file path | stdout | stderr
  format: json             # json | text
  add_source: false
  tee_stderr: false

# When true, accumulate token usage across turns and print a summary on exit (exit/quit/bye).
# Override: AGENT_SHOW_LLM_USAGE=true
show_llm_usage: false

# Optional MCP servers. Set enabled: true on entries you use.
# When any server is enabled, the CLI uses auto tool approval (same pattern as examples with MCP).
# Transports: stdio | local (subprocess); streamable_http | http | remote | streamable (URL).
mcp:
  servers:
    # Local subprocess MCP (example: leave disabled until command/args match your install)
    - enabled: false
      name: local
      transport: stdio
      command: node
      args: []   # e.g. ["-y","@modelcontextprotocol/server-filesystem","/path/to/dir"]
      env: {}    # optional string map for subprocess env
      timeout_seconds: 60
      retry_attempts: 3
      # allow_tools: [list, of, tool, names]
      # block_tools: []

    # Remote streamable HTTP MCP (example: public demo URL — verify in MCP docs before relying on it)
    - enabled: false
      name: remote
      transport: streamable_http
      url: ""   # e.g. https://example-server.modelcontextprotocol.io/mcp
      bearer_token: ""   # optional static bearer; omit if using oauth below
      oauth_client_id: ""
      oauth_client_secret: ""
      oauth_token_url: ""
      skip_tls_verify: false
      # headers: {}   # optional custom headers (API keys, etc.)
      timeout_seconds: 30
      retry_attempts: 3
