# Run from this directory:
#   npx promptfoo eval -c config.yaml

description: eval-harness agent run assertions

prompts:
  - "run eval check"

providers:
  - id: exec:../run_agent.sh
    label: eval-agent
  - id: exec:../run_agent_memory.sh ondemand
    label: eval-agent-memory-ondemand
  - id: exec:../run_agent_memory.sh always
    label: eval-agent-memory-always

tests:
  - description: all mock tools were called
    providers: [eval-agent]
    assert:
      - type: javascript
        value: |
          const res = JSON.parse(output);
          const breakdown = res.telemetry.tools.breakdown;
          const tools = Object.keys(breakdown);
          return tools.length === 3
            && breakdown.eval_tool_1 === 1
            && breakdown.eval_tool_2 === 1
            && breakdown.eval_tool_3 === 1;

  - description: agent completed successfully
    providers: [eval-agent]
    assert:
      - type: javascript
        value: |
          const res = JSON.parse(output);
          return res.telemetry.run.finish_reason === "complete"
            && res.content === "eval complete";

  - description: no failed tool calls
    providers: [eval-agent]
    assert:
      - type: javascript
        value: |
          const res = JSON.parse(output);
          return res.telemetry.tools.failed_calls === 0;

  - description: llm usage reported
    providers: [eval-agent]
    assert:
      - type: javascript
        value: |
          const res = JSON.parse(output);
          return res.llm_usage.total_tokens > 0;

  - description: memory ondemand stores then recalls
    providers: [eval-agent-memory-ondemand]
    assert:
      - type: javascript
        value: |
          const res = JSON.parse(output);
          const store = res.memory_scenario.store.telemetry.storage;
          const recall = res.memory_scenario.recall.telemetry.storage;
          return store.total_memory_stores >= 1
            && (store.failed_memory_stores || 0) === 0
            && recall.total_memory_recalls >= 1
            && (recall.failed_memory_recalls || 0) === 0;

  - description: memory always stores then recalls
    providers: [eval-agent-memory-always]
    assert:
      - type: javascript
        value: |
          const res = JSON.parse(output);
          const store = res.memory_scenario.store.telemetry.storage;
          const recall = res.memory_scenario.recall.telemetry.storage;
          return store.total_memory_stores >= 1
            && (store.failed_memory_stores || 0) === 0
            && recall.total_memory_recalls >= 1
            && (recall.failed_memory_recalls || 0) === 0;
