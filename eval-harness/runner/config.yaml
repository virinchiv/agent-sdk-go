runtime: local

user_prompt: "run eval check"

agent:
  name: eval-agent
  system_prompt: "You are an evaluation agent. Use available tools when helpful, then answer concisely."
  tool_count: 3

memory:
  enabled: false
  store_mode: ondemand
  user_id: eval-user
  scenario: store_recall
  store_prompt: "Remember for future runs: I prefer concise answers."
  recall_prompt: "What answer style do I prefer?"

temporal:
  host: localhost
  port: 7233
  namespace: default
  task_queue: eval-harness
