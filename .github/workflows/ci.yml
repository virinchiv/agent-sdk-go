# CI: lint, test, coverage, build
# - Push to branches (not main): full checks + coverage (no Codecov upload)
# - PR to main: same + Codecov upload
# - workflow_dispatch: same + Codecov upload (on-demand coverage report)
# - Push / merge to main: no workflow (already validated on the PR)
# (Secret scanning: run `make secrets-scan` locally.)
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore:
      - main
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # v2 is built with Go >= 1.26; v1.x binaries refuse modules targeting go 1.26+
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Code coverage
        run: make test-coverage

      - name: Upload coverage to Codecov
        if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: agenticenv/agent-sdk-go
          files: ./coverage.out

      - name: Build
        run: make build

  # examples:local — off until if: true and EXAMPLES_* repo secrets (examples/.env.defaults).
  examples:
    if: false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Task
        run: go install github.com/go-task/task/v3/cmd/task@latest

      - name: Configure examples/.env
        run: |
          cat > examples/.env <<EOF
          LLM_PROVIDER=${{ secrets.EXAMPLES_LLM_PROVIDER }}
          LLM_MODEL=${{ secrets.EXAMPLES_LLM_MODEL }}
          LLM_APIKEY=${{ secrets.EXAMPLES_LLM_APIKEY }}
          EMBEDDING_OPENAI_APIKEY=${{ secrets.EXAMPLES_EMBEDDING_OPENAI_APIKEY }}
          EOF

      - name: Run examples (local)
        run: task examples:local
