# examples/docker/docker-compose.yml

name: agent-sdk-go-examples

services:
  temporal:
    image: temporalio/temporal:latest
    ports:
      - "7233:7233"   # Temporal gRPC
      - "8233:8233"   # Temporal UI
    command: server start-dev --ip 0.0.0.0

  otel-lgtm:
    image: grafana/otel-lgtm:latest
    ports:
      - "3000:3000"   # Grafana UI
      - "4317:4317"   # OTEL gRPC
      - "4318:4318"   # OTEL HTTP

  redis:
    container_name: redis
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s

  weaviate:
    container_name: weaviate
    image: cr.weaviate.io/semitechnologies/weaviate:1.27.0
    ports:
      - "${WEAVIATE_HTTP_PORT:-8080}:8080"
      - "${WEAVIATE_GRPC_PORT:-50051}:50051"
    environment:
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      DEFAULT_VECTORIZER_MODULE: text2vec-openai
      ENABLE_MODULES: text2vec-openai
      OPENAI_APIKEY: ${EMBEDDING_OPENAI_APIKEY:?set EMBEDDING_OPENAI_APIKEY in examples/.env or environment}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/v1/.well-known/ready >/dev/null 2>&1 || exit 1"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 10s

  pgvector:
    container_name: pgvector
    image: pgvector/pgvector:pg16
    ports:
      - "${PGVECTOR_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${PGVECTOR_USER:-postgres}
      POSTGRES_PASSWORD: ${PGVECTOR_PASSWORD:-secret}
      POSTGRES_DB: ${PGVECTOR_DB:-vectordb}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGVECTOR_USER:-postgres} -d ${PGVECTOR_DB:-vectordb}"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s
